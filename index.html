<!DOCTYPE html>
<head>
    <title> Supra's Notes App </title>
    <style>
        /* ===== GLOBAL ===== */
body {
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top left, #667eea, #764ba2, #2d1d46);
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
}

/* ===== CONTAINER (GLASS) ===== */
.container {
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);

    margin-top: 40px;
    padding: 25px;
    width: 90%;
    max-width: 1200px;

    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.2);

    box-shadow: 0 10px 40px rgba(0,0,0,0.35);
}

#notesContainer {
    margin-top: 20px;
}

/* ===== TITLE ===== */
h1 {
    text-align: center;
    font-weight: 700;
    background: linear-gradient(90deg, #fff, #c7bfff);

    -webkit-background-clip: text;
    background-clip: text;

    -webkit-text-fill-color: transparent;
}

/* ===== INPUTS ===== */
textarea, input {
    width: 98%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #ccc;
    outline: none;
    font-size: 15px;
    margin-top: 10px;
    transition: all 0.25s ease;
}

textarea {
    height: 100px;
    resize: none;
}

textarea:focus, input:focus {
    border-color: #667eea;
    box-shadow: 0 0 10px rgba(102,126,234,0.6);
    transform: scale(1.01);
}

textarea:hover, input:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(108, 47, 165, 0.979);
}

/* ===== BUTTON ===== */
.add-btn {
    width: 100%;
    margin-top: 12px;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}

.add-btn:hover {
    transform: translateY(-3px) scale(1.01);
    box-shadow: 0 5px 15px rgba(108, 47, 165, 0.979);
}

/* shine effect */
.add-btn::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
    top: 0;
    left: -100%;
    transition: 0.6s;
}

.add-btn:hover::after {
    left: 100%;
}

/* ===== NOTES ===== */
.note {
    position: relative;
    display: flex;
    flex-direction: column;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);

    padding: 15px;
    border-radius: 12px;
    margin-top: 25px;

    border-left: 4px solid #667eea;

    transition: all 0.25s ease;
    animation: fadeInUp 0.4s ease;
}

.note-content {
    max-height: 500px;
    overflow-y: auto;
    padding-right: 5px; /* space for scrollbar */
}

/* 🔥 Custom Scrollbar (Chrome, Edge) */
.note-content::-webkit-scrollbar {
    width: 6px;
}

.note-content::-webkit-scrollbar-track {
    background: transparent;
}

.note-content::-webkit-scrollbar-thumb {
    background: rgb(66, 98, 240);
    border-radius: 10px;
}

.note-content::-webkit-scrollbar-thumb:hover {
    background: rgba(102,126,234,0.9);
}

#notesContainer {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.note:hover {
    transform: translateY(-3px) scale(1.01);
    box-shadow: 0 5px 15px rgba(108, 47, 165, 0.979);
}

/* ===== NOTE TEXT ===== */
.note strong {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 5px;
}

.note p {
    margin: 5px 0;
}

/* ===== MENU ===== */
.menu {
    position: absolute;
    right: 0;
    top: 32px;

    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);

    border-radius: 6px;
    padding: 3px; /* reduced from 4–8 */

    min-width: 100px; /* slightly smaller */

    box-shadow: 0 5px 12px rgba(0,0,0,0.2);
    z-index: 10;
}

.menu button {
    width: 100%;
    padding: 4px 6px; /* ↓ reduced */
    margin: 1px 0;    /* ↓ tighter spacing */

    font-size: 12.5px; /* slight shrink */

    border: none;
    border-radius: 4px;

    background: #667eea;
    color: white;

    cursor: pointer;
    transition: 0.2s;
    line-height: 1.2;
}

.menu button:hover {
    background: #5a67d8;
}

/* ===== SEARCH BAR ===== */
#searchInput {
    margin-bottom: 10px;
}

/* ===== DARK MODE ===== */
body.dark {
    background: #1b132b;
}

body.dark .container {
    background: rgba(30,30,30,0.8);
    color: white;
}

body.dark textarea,
body.dark input {
    background: #2c2c2c;
    color: white;
    border: 1px solid #444;
}

body.dark .note {
    background: rgba(50,50,50,0.6);
}

body.dark .note-content::-webkit-scrollbar-thumb {
    background: rgba(187,134,252,0.6);
}

body.dark .note-content::-webkit-scrollbar-thumb:hover {
    background: rgba(187,134,252,0.9);
}

body.dark .menu {
    background: rgba(40,40,40,0.9);
}

body.dark .menu button {
    background: #bb86fc;
}

/* ===== ANIMATION ===== */
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(15px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
    .container {
        width: 95%;
        padding: 15px;
    }

    h1 {
        font-size: 22px;
    }

    textarea {
        height: 80px;
    }
}

#toggleTheme {
    float: right;
    margin-bottom: 15px;
    padding: 8px 14px;

    border-radius: 20px;
    border: none;

    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);

    color: white;
    font-size: 13px;
    font-weight: 500;

    cursor: pointer;
    transition: all 0.25s ease;
}

/* hover */
#toggleTheme:hover {
    background: rgba(255,255,255,0.35);
    transform: translateY(-2px);
}

/* dark mode version */
body.dark #toggleTheme {
    background: rgba(255,255,255,0.1);
    color: #ddd;
}

body.dark #toggleTheme:hover {
    background: rgba(255,255,255,0.2);
}

.note button {
    background: rgba(0,0,0,0.05); /* subtle bg */
    border: none;
    color: #222; /* darker */
    font-size: 18px;
    cursor: pointer;
    transition: all 0.2s ease;
    padding: 5px 8px;
    border-radius: 6px;
}

/* hover */
.note button:hover {
    background: rgba(0,0,0,0.12);
    color: #000000;
}

/* dark mode */
body.dark .note button {
    background: rgba(255,255,255,0.08);
    color: #eee;
}

body.dark .note button:hover {
    background: rgba(255,255,255,0.15);
    color: #fcfcfc;
}

    </style>
</head>

<script>

let notes = [];
let editId = null;

/* ---------- CLOSE MENU FUNCTION ---------- */
function closeMenus() {
    document.querySelectorAll(".menu").forEach(m => {
        m.style.display = "none";
    });
}

/* ---------- CREATE NOTE ---------- */
function createNote(text, title){
    return {
        title: title,
        text: text
    };
}

/* ---------- LOAD APP ---------- */
window.onload = async function() {

    let userId = localStorage.getItem("user_id");

    if(!userId){
        window.location.href = "auth.html";
        return;
    }

    try {
        let res = await fetch(`http://127.0.0.1:8000/notes/${userId}`);

        if (!res.ok) throw new Error("Fetch failed");

        let data = await res.json();

        notes = data;
        notes.forEach(n => displayNotes(n));

    } catch (err) {
        alert("Failed to load notes 😭");
        console.error(err);
    }

    /* SEARCH */
    document.getElementById("searchInput").addEventListener("input", function() {

        let searchText = this.value.toLowerCase();
        let allNotes = document.querySelectorAll(".note");

        allNotes.forEach(noteDiv => {
            let title = noteDiv.querySelector("strong").innerText.toLowerCase();
            noteDiv.style.display = title.includes(searchText) ? "flex" : "none";
        });
    });

    /* DARK MODE */
    document.getElementById("toggleTheme").onclick = function() {

        document.body.classList.toggle("dark");

        this.innerText = document.body.classList.contains("dark")
            ? "☀️ Light Mode"
            : "🌙 Dark Mode";
    };

    /* MENU CLOSE */
    document.removeEventListener("click", closeMenus);
    document.addEventListener("click", closeMenus);
};

/* ---------- ADD / EDIT NOTE ---------- */
async function addNote() {

    let titleInput = document.getElementById("titleInput");
    let noteInput = document.getElementById("noteInput");

    let title = titleInput.value.trim() || "Untitled Note";
    let noteText = noteInput.value;

    if (noteText.trim() === "") {
        alert("Please write something before adding a note 😅");
        return;
    }

    /* EDIT MODE */
    if (editId !== null) {

        await fetch(`http://127.0.0.1:8000/notes/${editId}`, {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ title, text: noteText })
        });

        let note = notes.find(n => n.id === editId);
        if (note) {
            note.title = title;
            note.text = noteText;
        }

        editId = null;
        document.getElementById("addBtn").innerText = "Add Note";

        document.getElementById("notesContainer").innerHTML = "";
        notes.forEach(n => displayNotes(n));
    }

    /* ADD MODE */
    else {
        let userId = localStorage.getItem("user_id");

        let n = {
            title: title,
            text: noteText,
            user_id: userId
        };

        let res = await fetch("http://127.0.0.1:8000/notes", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(n)
        });

        let savedNote = await res.json();

        notes.push(savedNote);
        displayNotes(savedNote);
    }

    titleInput.value = "";
    noteInput.value = "";
}

/* ---------- DISPLAY NOTE ---------- */
function displayNotes(note){

    let noteDiv = document.createElement("div");
    noteDiv.className = "note";

    let topRow = document.createElement("div");
    topRow.style.display = "flex";
    topRow.style.justifyContent = "space-between";

    let title = document.createElement("strong");
    title.innerText = note.title || "Untitled";

    let menuBtn = document.createElement("button");
    menuBtn.innerText = "⋮";

    topRow.appendChild(title);
    topRow.appendChild(menuBtn);

    let text = document.createElement("p");
    text.innerText = note.text;

    let menu = document.createElement("div");
    menu.className = "menu";
    menu.style.display = "none";

    let deleteBtn = document.createElement("button");
    deleteBtn.innerText = "Delete";

    let editBtn = document.createElement("button");
    editBtn.innerText = "Edit";

    let detailsBtn = document.createElement("button");
    detailsBtn.innerText = "Details";

    menu.append(deleteBtn, detailsBtn, editBtn);

    /* MENU TOGGLE */
    menuBtn.onclick = function(e) {
        e.stopPropagation();

        document.querySelectorAll(".menu").forEach(m => {
            if (m !== menu) m.style.display = "none";
        });

        menu.style.display = (menu.style.display === "none") ? "block" : "none";
    };

    /* DELETE */
    deleteBtn.onclick = async function() {
        await fetch(`http://127.0.0.1:8000/notes/${note.id}`, { method: "DELETE" });

        noteDiv.remove();
        notes = notes.filter(n => n.id !== note.id);
    };

    /* EDIT */
    editBtn.onclick = function() {
        document.getElementById("titleInput").value = note.title;
        document.getElementById("noteInput").value = note.text;

        editId = note.id;
        document.getElementById("addBtn").innerText = "Update Note";
    };

    /* DETAILS */
    detailsBtn.onclick = function() {
        alert("Created at: " + note.createdAt);
    };

    let content = document.createElement("div");
    content.className = "note-content";
    content.appendChild(text);

    noteDiv.append(menu, topRow, content);
    document.getElementById("notesContainer").appendChild(noteDiv);
}

</script>

<body>
     
    <div class="container">

    <h1>NoteFY</h1>

    <button id="toggleTheme">🌙 Dark Mode</button>

    <label>Search Notes</label>
    <input id="searchInput" type="text" placeholder="Search notes by title... 🔍">

    <label>Title</label>
    <input id="titleInput" type="text" placeholder="Enter note title... 🏷️">

    <label>Note</label>
    <textarea id="noteInput" placeholder="Type your note here... ✍️"></textarea>

    <button id="addBtn" class="add-btn" onclick="addNote()">Add Note</button>

    <hr>

    <div id="notesContainer"></div>

</div>

</body>
</html>
